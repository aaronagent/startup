<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Startup — Analytics Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    padding: 32px 24px;
    line-height: 1.5;
  }
  .container { max-width: 960px; margin: 0 auto; }
  h1 { font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 4px; }
  .subtitle { color: #555; font-size: 14px; margin-bottom: 32px; }
  h2 { font-size: 16px; font-weight: 700; color: #888; margin: 32px 0 16px; text-transform: uppercase; letter-spacing: 1px; }

  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .metric-card {
    background: #111;
    border: 1px solid #1a1a1a;
    border-radius: 12px;
    padding: 20px;
  }
  .metric-label { font-size: 12px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .metric-value { font-size: 32px; font-weight: 800; color: #fff; }
  .metric-value.green { color: #00d4aa; }
  .metric-value.purple { color: #6c5ce7; }
  .metric-sub { font-size: 12px; color: #444; margin-top: 4px; }

  .events-table { width: 100%; border-collapse: collapse; }
  .events-table th { text-align: left; font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 12px; border-bottom: 1px solid #1a1a1a; }
  .events-table td { padding: 10px 12px; font-size: 13px; color: #ccc; border-bottom: 1px solid #111; }
  .events-table tr:hover td { background: #111; }

  .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 120px; margin: 16px 0; }
  .bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; }
  .bar { width: 100%; border-radius: 4px 4px 0 0; transition: height 0.5s ease; min-height: 2px; }
  .bar.green { background: #00d4aa; }
  .bar.purple { background: #6c5ce7; }
  .bar-label { font-size: 10px; color: #444; margin-top: 6px; }
  .bar-value { font-size: 11px; color: #888; margin-bottom: 4px; }

  .nav-back { display: inline-block; color: #555; text-decoration: none; font-size: 13px; margin-bottom: 24px; }
  .nav-back:hover { color: #00d4aa; }

  .refresh-btn {
    padding: 8px 18px; border-radius: 8px; background: #1a1a1a; border: 1px solid #222;
    color: #888; font-size: 13px; cursor: pointer; float: right; transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: #00d4aa; color: #00d4aa; }

  .empty-state { text-align: center; padding: 48px; color: #333; font-size: 14px; }

  @media (max-width: 600px) {
    .metrics { grid-template-columns: 1fr 1fr; }
    .bar-chart { height: 80px; }
  }
</style>
</head>
<body>
<div class="container">

<a href="index.html" class="nav-back">← Back to Hub</a>
<button class="refresh-btn" onclick="refresh()">↻ Refresh</button>

<h1>Analytics</h1>
<p class="subtitle">Local usage data from localStorage — no tracking, no cookies, fully private</p>

<div class="metrics" id="metricsGrid"></div>

<h2>LaunchKit — Generation History</h2>
<div id="lkChart"></div>
<table class="events-table" id="lkTable">
  <thead><tr><th>Tool</th><th>Tone</th><th>Time</th></tr></thead>
  <tbody id="lkBody"></tbody>
</table>

<h2>VibeBoard — Voting Activity</h2>
<div id="vbChart"></div>
<table class="events-table" id="vbTable">
  <thead><tr><th>Action</th><th>Details</th></tr></thead>
  <tbody id="vbBody"></tbody>
</table>

</div>

<script>
function refresh() {
  // LaunchKit data
  const lkHistory = JSON.parse(localStorage.getItem('lk-history') || '[]');
  const lkChecklist = JSON.parse(localStorage.getItem('lk-checklist') || '{}');
  const lkVisited = localStorage.getItem('lk-visited');
  const checklistDone = Object.values(lkChecklist).filter(Boolean).length;
  const checklistTotal = 20;

  // VibeBoard data
  const vbVotes = JSON.parse(localStorage.getItem('vb-votes') || '{}');
  const vbTheme = localStorage.getItem('vb-theme') || 'light';
  const lang = localStorage.getItem('lang') || 'en';

  const totalVotes = Object.values(vbVotes).reduce((sum, v) => sum + (v || 0), 0);
  const toolsVoted = Object.keys(vbVotes).filter(k => vbVotes[k] > 0).length;

  // Metrics
  document.getElementById('metricsGrid').innerHTML = `
    <div class="metric-card">
      <div class="metric-label">Packages Generated</div>
      <div class="metric-value green">${lkHistory.length}</div>
      <div class="metric-sub">LaunchKit</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Checklist Progress</div>
      <div class="metric-value green">${checklistDone}/${checklistTotal}</div>
      <div class="metric-sub">${checklistTotal > 0 ? Math.round(checklistDone/checklistTotal*100) : 0}% complete</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Tools Voted</div>
      <div class="metric-value purple">${toolsVoted}</div>
      <div class="metric-sub">VibeBoard</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Total Votes Cast</div>
      <div class="metric-value purple">${totalVotes}</div>
      <div class="metric-sub">VibeBoard</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Language</div>
      <div class="metric-value" style="font-size:24px;">${lang === 'zh' ? '中文' : 'English'}</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">VB Theme</div>
      <div class="metric-value" style="font-size:24px;">${vbTheme === 'dark' ? '🌙 Dark' : '☀️ Light'}</div>
    </div>
  `;

  // LK History table
  const lkBody = document.getElementById('lkBody');
  if (lkHistory.length === 0) {
    lkBody.innerHTML = '<tr><td colspan="3" class="empty-state">No packages generated yet. Try LaunchKit!</td></tr>';
  } else {
    lkBody.innerHTML = lkHistory.map(h => {
      const ago = timeAgo(h.timestamp);
      return `<tr><td style="color:#fff;font-weight:500;">${h.name}</td><td>${h.tone}</td><td style="color:#555;">${ago}</td></tr>`;
    }).join('');
  }

  // LK Chart — generations by tone
  const toneCount = { professional: 0, casual: 0, hype: 0 };
  lkHistory.forEach(h => { if (toneCount[h.tone] !== undefined) toneCount[h.tone]++; });
  const maxTone = Math.max(...Object.values(toneCount), 1);
  document.getElementById('lkChart').innerHTML = `<div class="bar-chart">
    ${Object.entries(toneCount).map(([k, v]) => `
      <div class="bar-col">
        <div class="bar-value">${v}</div>
        <div class="bar green" style="height:${(v/maxTone)*100}%"></div>
        <div class="bar-label">${k}</div>
      </div>
    `).join('')}
  </div>`;

  // VB data
  const vbBody = document.getElementById('vbBody');
  const voteEntries = Object.entries(vbVotes).filter(([k, v]) => v > 0);
  if (voteEntries.length === 0) {
    vbBody.innerHTML = '<tr><td colspan="2" class="empty-state">No votes yet. Try VibeBoard!</td></tr>';
  } else {
    vbBody.innerHTML = voteEntries.map(([id, count]) =>
      `<tr><td style="color:#fff;">Upvoted</td><td>Tool #${id} (${count} vote${count>1?'s':''})</td></tr>`
    ).join('');
  }
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

refresh();
</script>
</body>
</html>

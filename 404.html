<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 24px;
  }
  .code { font-size: 120px; font-weight: 800; color: #1a1a1a; line-height: 1; }
  .msg { font-size: 18px; color: #555; margin: 16px 0 32px; }
  .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  .links a {
    padding: 10px 24px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
  }
  .lk { background: #00d4aa; color: #0a0a0a; }
  .vb { background: #6c5ce7; color: #fff; }
  .hub { background: #1a1a1a; color: #888; border: 1px solid #222; }
  .links a:hover { transform: translateY(-2px); }
</style>
</head>
<body>
<div>
  <div class="code">404</div>
  <div class="msg">This page doesn't exist yet. But you could build it.</div>
  <div class="links">
    <a href="/startup/" class="hub">Hub</a>
    <a href="/startup/launchkit/" class="lk">LaunchKit</a>
    <a href="/startup/vibeboard/" class="vb">VibeBoard</a>
  </div>
</div>
</body>
</html>
